name: CI

on: [push, pull_request]

jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        configuration: [Debug, Release]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
    - name: Build and test
      shell: pwsh
      run: |
        $shellExt = if ($IsWindows) { "cmd" } else { "sh" }
        & ./build-and-test.$shellExt --configuration ${{ matrix.configuration }}

  nuget-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    permissions:
      id-token: write
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
    - run: .\build-and-test.cmd -c Release -notest
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}    
    - name: NuGet push
      run: dotnet nuget push .\artifacts\packages\Release\*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json -- no-symbols
